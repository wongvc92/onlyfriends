version: "3.9"
services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend.prod
    image: frontend-prod:latest
    container_name: frontend-prod

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend.prod
    image: backend-prod:latest
    container_name: backend-prod
    env_file:
      - ../.env
    environment:
      - VITE_SERVER_URL
      - DATABASE_URL
      - APP_ORIGIN
      - BASE_PATH
      - NODE_ENV
      - PORT
      - ACCESS_TOKEN_SECRET
      - REFRESH_TOKEN_SECRET
      - RESEND_API_KEY
      - RESEND_VERIFIED_DOMAIN
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_BUCKET_NAME

  postgres:
    image: postgres:16-alpine
    container_name: postgres-prod
    env_file:
      - ../.env
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - db_data_prod:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: nginx-prod
    depends_on:
      - frontend
      - backend
    # If using the custom nginx.conf, mount or copy it:
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    # Nginx will talk to 'backend' and serve 'frontend' files
    # 'frontend' static files are built into the image so no volume needed
    # 'backend' accessed via Docker network: http://backend:3000
    restart: unless-stopped

volumes:
  db_data_prod:
