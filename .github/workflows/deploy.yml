name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 4. Build and push Client Docker image
      - name: Build and push Client
        run: |
          docker build -t ${{ secrets.CLIENT_IMAGE }} ./client
          docker push ${{ secrets.CLIENT_IMAGE }}

      # 5. Build and push Server Docker image
      - name: Build and push Server
        run: |
          docker build -t ${{ secrets.SERVER_IMAGE }} ./server
          docker push ${{ secrets.SERVER_IMAGE }}

      # 6. Build and push Nginx Docker image
      - name: Build and push Nginx
        run: |
          docker build -t ${{ secrets.NGINX_IMAGE }} ./nginx
          docker push ${{ secrets.NGINX_IMAGE }}

      # 7. Deploy to EC2 via SSH
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            # Update package lists
            echo "Updating package lists..."
            sudo apt update

            # Check if Docker is installed
            if ! command -v docker &>/dev/null; then
              echo "Docker not found. Installing Docker..."
              sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
              echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io
            else
              echo "Docker is already installed."
            fi

            # Add the specified AWS username to the Docker group
            echo "Adding ${{ secrets.EC2_USER }} to the Docker group..."
            sudo usermod -aG docker ${{ secrets.EC2_USER }}

            # Check if Docker Compose is installed
            if ! docker compose version &>/dev/null; then
              echo "Docker Compose not found. Installing Docker Compose v2..."
              mkdir -p ~/.docker/cli-plugins/
              curl -SL https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
              chmod +x ~/.docker/cli-plugins/docker-compose
            else
              echo "Docker Compose is already installed."
            fi

            # Log in to Docker Hub
            echo "Logging in to Docker Hub..."
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

            # Verify Docker Login
            echo "Verifying Docker login..."
            docker info | grep "Username"

            # Navigate to the deployment directory
            cd ${{ secrets.REMOTE_PATH }}

            # Stop and remove existing containers
            echo "Stopping and removing existing containers..."
            docker compose down

            # Update the .env file with the latest environment variables
            echo "Updating .env file with environment variables..."
            cat <<EOF > .env
            NODE_ENV=production
            VITE_SERVER_URL=https://wvcdev.xyz/api
            VITE_ALLOWED_IMAGE_DOMAIN=https://onlyfriends-1.s3.ap-southeast-1.amazonaws.com
            PORT=5000
            APP_ORIGIN=https://wvcdev.xyz
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }}
            REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_VERIFIED_DOMAIN=wvcdev.com
            ALLOWED_IMAGE_DOMAIN=https://onlyfriends-1.s3.ap-southeast-1.amazonaws.com
            AWS_REGION=ap-southeast-1
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_BUCKET_NAME=onlyfriends-1
            CLIENT_IMAGE=${{ secrets.CLIENT_IMAGE }}
            SERVER_IMAGE=${{ secrets.SERVER_IMAGE }}
            NGINX_IMAGE=${{ secrets.NGINX_IMAGE }}
            EOF

            # Print .env file for debugging (remove in production)
            echo "Contents of .env file:"
            cat .env

            # Pull the latest Docker images
            echo "Pulling the latest Docker images..."
            docker compose pull

            # Recreate and start containers without building
            echo "Starting containers with the latest images..."
            docker compose up -d --no-build

            # Optional: Verify running containers
            echo "Verifying running containers..."
            docker ps
